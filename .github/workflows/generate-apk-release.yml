name: Generated APK

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write  # Required for SLSA provenance signing
  actions: read    # Required for SLSA provenance

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    outputs:
      version_name: ${{ steps.version.outputs.version_name }}
      hashes: ${{ steps.hashes.outputs.hashes }}
    steps:
      - uses: actions/checkout@v4

      - name: Set version name
        id: version
        run: |
          VER=$(grep versionName ./app/build.gradle.kts | awk -F '"' '{print $2}')
          echo "version_name=$VER" >> $GITHUB_OUTPUT

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: Restore keystore
        run: echo "${{ secrets.KEYSTORE_B64 }}" | base64 --decode > ./app/release.jks

      - name: Restore google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: printf '%s' "$GOOGLE_SERVICES_JSON" > ./app/google-services.json

      - name: Build APKs
        run: bash build-apk.sh

      - name: Compute SHA-256 hashes for SLSA
        id: hashes
        run: |
          VERSION="${{ steps.version.outputs.version_name }}"
          echo "hashes=$(sha256sum \
            "PlainApp-${VERSION}-default.apk" \
            "PlainApp-${VERSION}-armeabi-v7a.apk" \
            | base64 -w0)" >> $GITHUB_OUTPUT

      - name: Upload APKs as build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apks
          path: |
            PlainApp-${{ steps.version.outputs.version_name }}-default.apk
            PlainApp-${{ steps.version.outputs.version_name }}-armeabi-v7a.apk
          if-no-files-found: error
          retention-days: 1

  provenance:
    needs: build
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.build.outputs.hashes }}
      upload-assets: false

  virustotal:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      default_report: ${{ steps.scan.outputs.default_report }}
      armv7_report: ${{ steps.scan.outputs.armv7_report }}
    steps:
      - name: Download APKs
        uses: actions/download-artifact@v4
        with:
          name: apks

      - name: Upload to VirusTotal and get report links
        id: scan
        env:
          VT_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
          VERSION: ${{ needs.build.outputs.version_name }}
        run: |
          upload_and_poll() {
            local file="$1"
            local sha256
            sha256=$(sha256sum "$file" | awk '{print $1}')
            local size_bytes
            size_bytes=$(stat -c%s "$file")
            local upload_url="https://www.virustotal.com/api/v3/files"
            # Files > 32 MB require a dedicated large-file upload URL
            if [ "$size_bytes" -gt 33554432 ]; then
              upload_url=$(curl -sS --request GET \
                --url https://www.virustotal.com/api/v3/files/upload_url \
                --header "x-apikey: $VT_API_KEY" | jq -r '.data')
              if [ -z "$upload_url" ] || [ "$upload_url" = "null" ]; then
                echo "https://www.virustotal.com/gui/file/$sha256/detection"
                return
              fi
            fi
            local analysis_id
            analysis_id=$(curl -sS --request POST \
              --url "$upload_url" \
              --header "x-apikey: $VT_API_KEY" \
              --form "file=@$file" | jq -r '.data.id')
            if [ -z "$analysis_id" ] || [ "$analysis_id" = "null" ]; then
              echo "https://www.virustotal.com/gui/file/$sha256/detection"
              return
            fi
            for i in $(seq 1 30); do
              sleep 20
              local status
              status=$(curl -sS \
                --url "https://www.virustotal.com/api/v3/analyses/$analysis_id" \
                --header "x-apikey: $VT_API_KEY" | jq -r '.data.attributes.status')
              [ "$status" = "completed" ] && break
            done
            echo "https://www.virustotal.com/gui/file/$sha256/detection"
          }
          DEFAULT_REPORT=$(upload_and_poll "PlainApp-${VERSION}-default.apk")
          ARMV7_REPORT=$(upload_and_poll "PlainApp-${VERSION}-armeabi-v7a.apk")
          echo "default_report=$DEFAULT_REPORT" >> $GITHUB_OUTPUT
          echo "armv7_report=$ARMV7_REPORT" >> $GITHUB_OUTPUT

  release:
    needs: [build, provenance, virustotal]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download APKs
        uses: actions/download-artifact@v4
        with:
          name: apks

      - name: Download SLSA provenance
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.provenance.outputs.provenance-name }}

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ needs.build.outputs.version_name }}
          name: Release ${{ needs.build.outputs.version_name }}
          body: |
            ## What's Changed

            ## Security

            ### VirusTotal Scan
            | APK | Scan Report |
            |-----|-------------|
            | `PlainApp-${{ needs.build.outputs.version_name }}-default.apk` | [View Report](${{ needs.virustotal.outputs.default_report }}) |
            | `PlainApp-${{ needs.build.outputs.version_name }}-armeabi-v7a.apk` | [View Report](${{ needs.virustotal.outputs.armv7_report }}) |

            ### SLSA Provenance (Level 3)
            The `.intoto.jsonl` file attached to this release is a signed SLSA provenance document.
            Verify with [slsa-verifier](https://github.com/slsa-framework/slsa-verifier):
            ```sh
            slsa-verifier verify-artifact PlainApp-${{ needs.build.outputs.version_name }}-default.apk \
              --provenance-path ${{ needs.provenance.outputs.provenance-name }} \
              --source-uri github.com/${{ github.repository }}
            ```
          draft: true
          prerelease: false
          artifacts: "PlainApp-${{ needs.build.outputs.version_name }}-default.apk,PlainApp-${{ needs.build.outputs.version_name }}-armeabi-v7a.apk,${{ needs.provenance.outputs.provenance-name }}"

